<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App 2</title>
  <style>
    :root {
      color-scheme: light;
      font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
      background: #eaf0e8;
      color: #18231d;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at left top, rgba(92, 133, 108, 0.18), transparent 28%),
        linear-gradient(180deg, #f7fbf6 0%, #dfe8dc 100%);
      min-height: 100vh;
    }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 96px 24px 40px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2.8rem;
    }

    p {
      line-height: 1.5;
      max-width: 58ch;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      background: #18231d;
      color: #eef7ef;
      font: inherit;
      cursor: pointer;
      margin-top: 12px;
    }

    pre {
      margin-top: 18px;
      padding: 16px;
      border-radius: 16px;
      background: rgba(24, 35, 29, 0.9);
      color: #eef7ef;
      white-space: pre-wrap;
      min-height: 120px;
    }
  </style>
</head>
<body>
  <main>
    <h1>App 2</h1>
    <p>Reads <code>/foo.txt</code> from the shared LightningFS filesystem. Reload after sync to refresh the visible state.</p>
    <button id="refresh-button" type="button">Refresh /foo.txt</button>
    <pre id="status">Initializing...</pre>
  </main>

  <script type="module" src="/public/apps/sync/syncbar.js"></script>
  <script type="module">
    import { fs } from '/public/libs/flare/fs.js';

    const status = document.getElementById('status');
    const filePath = '/foo.txt';

    async function readFile() {
      try {
        const contents = await fs.promises.readFile(filePath, { encoding: 'utf8' });
        status.textContent = 'Read /foo.txt\n\n' + contents;
      } catch (error) {
        status.textContent = 'Read failed: ' + error.message;
      }
    }

    document.getElementById('refresh-button').addEventListener('click', readFile);

    await readFile();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#221b13">
  <link rel="manifest" href="/public/apps/sync/manifest.webmanifest">
  <link rel="icon" href="/public/apps/sync/icon.svg" type="image/svg+xml">
  <title>Sync Setup</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Georgia, 'Times New Roman', serif;
      background: #f7f1e8;
      color: #221b13;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(219, 176, 106, 0.18), transparent 32%),
        linear-gradient(180deg, #fcf7f0 0%, #ece1d1 100%);
    }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 40px 24px 56px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2.4rem;
    }

    form {
      display: grid;
      gap: 14px;
      margin-top: 22px;
      padding: 24px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.74);
      box-shadow: 0 18px 40px rgba(76, 53, 28, 0.12);
    }

    label {
      display: grid;
      gap: 6px;
      font-size: 0.95rem;
    }

    input {
      border: 1px solid rgba(34, 27, 19, 0.18);
      border-radius: 12px;
      padding: 12px 14px;
      font: inherit;
      background: rgba(255, 255, 255, 0.9);
    }

    button {
      justify-self: start;
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      background: #221b13;
      color: #fff6eb;
      font: inherit;
      cursor: pointer;
    }

    .panel {
      margin-top: 18px;
      padding: 16px;
      border-radius: 16px;
      background: rgba(34, 27, 19, 0.9);
      color: #fbf3e8;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <main>
    <h1>Sync Setup</h1>
    <p>Configure S3 credentials in the shared filesystem. This page only runs sync when it receives commands from the hidden iframe protocol.</p>

    <form id="credentials-form">
      <label>
        AWS Access Key ID
        <input id="access-key" name="accessKey" autocomplete="off">
      </label>
      <label>
        AWS Secret Access Key
        <input id="secret-key" name="secretKey" autocomplete="off">
      </label>
      <label>
        Region
        <input id="region" name="region" value="us-east-1">
      </label>
      <label>
        Bucket
        <input id="bucket" name="bucket" autocomplete="off">
      </label>
      <label>
        Prefix
        <input id="prefix" name="prefix" autocomplete="off">
      </label>
      <button type="submit">Save credentials</button>
    </form>

    <div class="panel" id="view-status">Initializing...</div>
  </main>

  <script type="module">
    import { registerPwa } from '/public/libs/flare/pwa.js';
    import {
      CREDENTIALS_PATH,
      SYNC_SOURCE,
      hasValidCredentials,
      initializeSyncRuntime,
      inspectSyncState,
      performSync,
      readSavedCredentials,
      saveCredentials
    } from './sync.js';

    registerPwa('sync');

    const embedded = window.parent !== window;
    const viewStatus = document.getElementById('view-status');
    const viewStatusHistory = [];
    const form = document.getElementById('credentials-form');
    const formFields = {
      accessKey: document.getElementById('access-key'),
      secretKey: document.getElementById('secret-key'),
      region: document.getElementById('region'),
      bucket: document.getElementById('bucket'),
      prefix: document.getElementById('prefix')
    };

    await initializeSyncRuntime();
    await loadSavedCredentialsIntoForm();
    setViewStatus(embedded ? 'Embedded sync runtime ready.' : 'Update credentials here. Sync runs only when an app sends a command.');

    window.addEventListener('message', async (event) => {
      if (event.origin !== window.location.origin || event.data?.source !== SYNC_SOURCE) {
        return;
      }

      if (event.data.type === 'check') {
        await handleCheck(event.data.requestId);
        return;
      }

      if (event.data.type === 'sync') {
        await handleSync(event.data.requestId);
      }
    });

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      await saveCredentials(readCredentialsFromForm());
      setViewStatus('Saved credentials to ' + CREDENTIALS_PATH);
    });

    if (embedded) {
      console.log('[sync-frame]', 'ready');
      parent.postMessage({
        source: SYNC_SOURCE,
        type: 'sync-ready',
        requestId: 'boot',
        payload: {}
      }, window.location.origin);
    }

    async function handleCheck(requestId) {
      try {
        console.log('[sync-frame]', 'check:start', { requestId });
        const credentials = await readSavedCredentials();
        if (!hasValidCredentials(credentials)) {
          console.warn('[sync-frame]', 'check:setup-needed', { requestId });
          postToParent('sync-status', requestId, { status: 'setup-needed' });
          return;
        }

        if (!navigator.onLine) {
          console.warn('[sync-frame]', 'check:offline', { requestId });
          postToParent('sync-status', requestId, { status: 'offline' });
          return;
        }

        setViewStatus('Checking local and remote state...');
        const inspection = await inspectSyncState(credentials, {
          requestId,
          onProgress(payload) {
            setViewStatus(payload.message, payload.append);
          }
        });
        console.log('[sync-frame]', 'check:complete', { requestId, inspection });
        postToParent('sync-status', requestId, inspection);
        setViewStatus('Check complete: ' + inspection.status);
      } catch (error) {
        console.error('[sync-frame]', 'check:failed', { requestId, code: error.code || 'check-failed' }, error);
        postToParent('sync-status', requestId, {
          status: 'error',
          code: error.code || 'check-failed',
          summary: error.message
        });
        setViewStatus('Check failed: ' + error.message);
      }
    }

    async function handleSync(requestId) {
      try {
        console.log('[sync-frame]', 'sync:start', { requestId });
        setViewStatus('Starting sync...');
        const result = await performSync({
          requestId,
          onProgress(payload) {
            postToParent('sync-progress', requestId, payload);
            setViewStatus(payload.message, payload.append);
          }
        });

        console.log('[sync-frame]', 'sync:complete', { requestId, result });
        postToParent('sync-complete', requestId, result);
        setViewStatus('Sync complete.');
      } catch (error) {
        console.error('[sync-frame]', 'sync:failed', { requestId, code: error.code || 'sync-failed' }, error);
        postToParent('sync-error', requestId, {
          code: error.code || 'sync-failed',
          message: error.message
        });
        setViewStatus('Sync failed: ' + error.message);
      }
    }

    async function loadSavedCredentialsIntoForm() {
      const credentials = await readSavedCredentials();
      if (!credentials) {
        return;
      }

      formFields.accessKey.value = credentials.accessKey || '';
      formFields.secretKey.value = credentials.secretKey || '';
      formFields.region.value = credentials.region || 'us-east-1';
      formFields.bucket.value = credentials.bucket || '';
      formFields.prefix.value = credentials.prefix || '';
    }

    function readCredentialsFromForm() {
      return {
        accessKey: formFields.accessKey.value.trim(),
        secretKey: formFields.secretKey.value.trim(),
        region: formFields.region.value.trim() || 'us-east-1',
        bucket: formFields.bucket.value.trim(),
        prefix: formFields.prefix.value.trim()
      };
    }

    function postToParent(type, requestId, payload) {
      if (!embedded) {
        return;
      }

      console.log('[sync-frame]', 'post', { type, requestId, payload });

      parent.postMessage({
        source: SYNC_SOURCE,
        type,
        requestId,
        payload
      }, window.location.origin);
    }

    function setViewStatus(message, append = false) {
      if (!append) {
        viewStatusHistory.length = 0;
      }

      viewStatusHistory.push(message);
      viewStatus.textContent = viewStatusHistory.join('\n\n');
    }
  </script>
</body>
</html>

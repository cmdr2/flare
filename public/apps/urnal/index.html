<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#272822">
  <link rel="manifest" href="/public/apps/urnal/manifest.webmanifest">
  <link rel="icon" href="/public/apps/urnal/icon.svg" type="image/svg+xml">
  <title>Urnal</title>
  <style>
    :root {
      --syncbar-offset: 50px;
      color-scheme: dark;
      font-family: 'SFMono-Regular', ui-monospace, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
      background: #272822;
      color: #f8f8f2;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(166, 226, 46, 0.12), transparent 32%),
        linear-gradient(180deg, #2f3129 0%, #272822 26%, #1f201c 100%);
    }

    main {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: calc(var(--syncbar-offset) + 16px) 16px 16px;
    }

    .composer {
      flex: 1;
      width: 100%;
      min-height: 0;
      border: 1px solid #49483e;
      border-radius: 18px;
      padding: 18px;
      background: rgba(39, 40, 34, 0.94);
      color: #f8f8f2;
      font: inherit;
      font-size: 1rem;
      line-height: 1.6;
      resize: none;
      outline: none;
      box-shadow: inset 0 0 0 1px rgba(166, 226, 46, 0.08);
    }

    .composer::placeholder {
      color: #75715e;
    }

    .composer:focus {
      border-color: #66d9ef;
      box-shadow: 0 0 0 3px rgba(102, 217, 239, 0.16);
    }

    .post-button {
      width: 100%;
      border: 0;
      border-radius: 18px;
      padding: 18px 20px;
      background: linear-gradient(180deg, #a6e22e 0%, #8cc723 100%);
      color: #1f201c;
      font: inherit;
      font-size: 1.08rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.28);
    }

    .post-button:disabled {
      opacity: 0.6;
      cursor: default;
      box-shadow: none;
    }

    .status {
      min-height: 1.2em;
      color: #f92672;
      font-size: 0.92rem;
    }

    .status[data-tone="success"] {
      color: #a6e22e;
    }

    .status[data-tone="info"] {
      color: #66d9ef;
    }
  </style>
</head>
<body>
  <script type="module" src="/public/apps/sync/syncbar.js"></script>

  <main>
    <textarea
      id="composer"
      class="composer"
      spellcheck="false"
      placeholder="Write something worth keeping..."></textarea>
    <button id="post-button" class="post-button" type="button">Post</button>
    <div id="status" class="status" aria-live="polite"></div>
  </main>

  <script type="module">
    import { registerPwa } from '/public/libs/flare/pwa.js';
    import { fs } from '/public/libs/flare/fs.js';

    registerPwa('urnal');

    const POSTS_DIR = '/home/.urnal';
    const composer = document.getElementById('composer');
    const postButton = document.getElementById('post-button');
    const status = document.getElementById('status');
    const WEEKDAYS = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    const SHORT_MONTHS = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    const FULL_MONTHS = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

    composer.focus();
    syncPostButtonState();

    composer.addEventListener('input', () => {
      setStatus('');
      syncPostButtonState();
    });

    postButton.addEventListener('click', () => {
      void submitPost();
    });

    composer.addEventListener('keydown', (event) => {
      if ((event.metaKey || event.ctrlKey) && event.key === 'Enter' && !postButton.disabled) {
        event.preventDefault();
        void submitPost();
      }
    });

    async function submitPost() {
      const body = composer.value.replace(/\r\n/g, '\n');
      if (!body.trim()) {
        setStatus('Write something before posting.', 'info');
        syncPostButtonState();
        return;
      }

      postButton.disabled = true;
      setStatus('Posting...', 'info');

      try {
        const now = new Date();
        const fileName = getMonthlyFileName(now);
        const filePath = POSTS_DIR + '/' + fileName;
        const entry = buildEntry(now, body.replace(/\n+$/, ''));

        await ensureDir(POSTS_DIR);

        const existing = await readTextIfPresent(filePath);
        const nextContent = existing
          ? existing.replace(/\n*$/, '') + '\n\n--\n' + entry
          : entry;

        await fs.promises.writeFile(filePath, nextContent);

        composer.value = '';
        composer.focus();
        setStatus('Posted to ' + fileName, 'success');
      } catch (error) {
        setStatus('Post failed: ' + error.message);
      } finally {
        syncPostButtonState();
      }
    }

    async function ensureDir(path) {
      if (!path || path === '/') {
        return;
      }

      const parts = path.split('/').filter(Boolean);
      let current = '';

      for (const part of parts) {
        current += '/' + part;
        try {
          await fs.promises.mkdir(current);
        } catch {
        }
      }
    }

    async function readTextIfPresent(path) {
      try {
        return await fs.promises.readFile(path, { encoding: 'utf8' });
      } catch (error) {
        if (error?.code === 'ENOENT' || /no such file/i.test(String(error?.message || ''))) {
          return '';
        }
        throw error;
      }
    }

    function buildEntry(date, body) {
      return formatTimestamp(date) + '\n\n' + body + '\n\n';
    }

    function getMonthlyFileName(date) {
      return FULL_MONTHS[date.getMonth()] + ' ' + date.getFullYear() + '.txt';
    }

    function formatTimestamp(date) {
      return [
        WEEKDAYS[date.getDay()],
        SHORT_MONTHS[date.getMonth()],
        String(date.getDate()),
        pad(date.getHours()) + ':' + pad(date.getMinutes()) + ':' + pad(date.getSeconds()),
        String(date.getFullYear())
      ].join(' ');
    }

    function pad(value) {
      return String(value).padStart(2, '0');
    }

    function syncPostButtonState() {
      postButton.disabled = !composer.value.trim();
    }

    function setStatus(message, tone = '') {
      status.textContent = message;
      if (tone) {
        status.dataset.tone = tone;
        return;
      }
      delete status.dataset.tone;
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1f1d1a">
  <link rel="manifest" href="/public/apps/explorer/manifest.webmanifest">
  <link rel="icon" href="/public/apps/explorer/icon.svg" type="image/svg+xml">
  <title>Explorer</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Georgia, 'Times New Roman', serif;
      background: #f4efe6;
      color: #1f1d1a;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top right, rgba(183, 119, 56, 0.14), transparent 30%),
        linear-gradient(180deg, #fbf7f0 0%, #efe5d6 100%);
      min-height: 100vh;
    }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 76px 24px 40px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2.8rem;
    }

    p {
      line-height: 1.5;
      max-width: 58ch;
    }

    .file-browser {
      margin-top: 28px;
      padding: 18px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.68);
      box-shadow: 0 16px 34px rgba(76, 53, 28, 0.08);
    }

    .file-browser h2 {
      margin: 0 0 12px;
      font-size: 1.25rem;
    }

    .file-list {
      display: grid;
      gap: 4px;
      max-width: 100%;
      max-height: min(42vh, 320px);
      overflow: auto;
      padding-right: 4px;
    }

    .file-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-width: max-content;
      padding: 2px 0;
    }

    .file-open {
      padding: 0;
      border: 0;
      background: transparent;
      color: #1f1d1a;
      font: inherit;
      text-align: left;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 0.12em;
      white-space: nowrap;
    }

    .file-delete {
      background: #a33a21;
      padding: 6px 10px;
      font-size: 0.9rem;
    }

    .empty-state {
      margin: 0;
      color: rgba(31, 29, 26, 0.75);
    }

    .path-field {
      width: 100%;
      margin-top: 18px;
      border: 1px solid rgba(31, 29, 26, 0.2);
      border-radius: 14px;
      padding: 12px 14px;
      font: inherit;
      background: rgba(255, 255, 255, 0.82);
      box-sizing: border-box;
    }

    textarea {
      width: 100%;
      min-height: 220px;
      margin-top: 18px;
      border: 1px solid rgba(31, 29, 26, 0.2);
      border-radius: 16px;
      padding: 16px;
      font: inherit;
      background: rgba(255, 255, 255, 0.8);
      box-sizing: border-box;
      resize: vertical;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      background: #1f1d1a;
      color: #fff8ef;
      font: inherit;
      cursor: pointer;
    }

    pre {
      margin-top: 18px;
      padding: 16px;
      border-radius: 16px;
      background: rgba(31, 29, 26, 0.9);
      color: #f9f2e8;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <main>
    <h1>Explorer</h1>
    <p>Browse, edit, create, and delete files in the shared LightningFS filesystem. The shared sync bar is injected automatically.</p>
    <section class="file-browser" aria-labelledby="file-browser-title">
      <h2 id="file-browser-title">Files</h2>
      <div class="file-list" id="file-list"></div>
    </section>
    <input id="file-path" class="path-field" type="text" placeholder="/path/to/file.txt" spellcheck="false">
    <textarea id="editor" placeholder="Write something to save into the selected file"></textarea>
    <div class="actions">
      <button id="save-button" type="button">Save</button>
      <button id="new-file-button" type="button">New file</button>
    </div>
    <pre id="status">Initializing...</pre>
  </main>

  <script type="module" src="/public/apps/sync/syncbar.js"></script>
  <script type="module">
    import { registerPwa } from '/public/libs/flare/pwa.js';
    import { fs } from '/public/libs/flare/fs.js';

    registerPwa('explorer');

    const fileList = document.getElementById('file-list');
    const filePathInput = document.getElementById('file-path');
    const editor = document.getElementById('editor');
    const status = document.getElementById('status');
    const saveButton = document.getElementById('save-button');
    const newFileButton = document.getElementById('new-file-button');

    async function refreshFileList() {
      const files = (await listAll('/')).sort((left, right) => left.localeCompare(right));

      if (files.length === 0) {
        fileList.innerHTML = '<p class="empty-state">No files in the filesystem yet.</p>';
        return;
      }

      fileList.replaceChildren(...files.map((path) => {
        const row = document.createElement('div');
        row.className = 'file-row';

        const openButton = document.createElement('button');
        openButton.type = 'button';
        openButton.className = 'file-open';
        openButton.textContent = path;
        openButton.addEventListener('click', () => loadFile(path));

        const deleteButton = document.createElement('button');
        deleteButton.type = 'button';
        deleteButton.className = 'file-delete';
        deleteButton.textContent = 'Delete';
        deleteButton.addEventListener('click', () => deleteFile(path));

        row.append(openButton, deleteButton);
        return row;
      }));
    }

    async function loadFile(path = filePathInput.value.trim()) {
      if (!isValidPath(path)) {
        status.textContent = 'Load failed: filepath must start with /';
        return;
      }

      try {
        const contents = await fs.promises.readFile(path, { encoding: 'utf8' });
        filePathInput.value = path;
        editor.value = contents;
        status.textContent = 'Loaded ' + path;
      } catch (error) {
        status.textContent = 'Load failed: ' + error.message;
      }
    }

    async function saveFile() {
      const path = filePathInput.value.trim();
      if (!isValidPath(path)) {
        status.textContent = 'Save failed: filepath must start with /';
        return;
      }

      try {
        await ensureDir(parentDir(path));
        await fs.promises.writeFile(path, editor.value);
        await refreshFileList();
        status.textContent = 'Saved ' + path;
      } catch (error) {
        status.textContent = 'Save failed: ' + error.message;
      }
    }

    async function deleteFile(path) {
      if (!window.confirm('Delete ' + path + '?')) {
        return;
      }

      try {
        await fs.promises.unlink(path);
        if (filePathInput.value.trim() === path) {
          filePathInput.value = '/';
          editor.value = '';
        }
        await refreshFileList();
        status.textContent = 'Deleted ' + path;
      } catch (error) {
        status.textContent = 'Delete failed: ' + error.message;
      }
    }

    function startNewFile() {
      filePathInput.value = '/';
      editor.value = '';
      filePathInput.focus();
      filePathInput.setSelectionRange(1, 1);
      status.textContent = 'Enter a new filepath starting with /';
    }

    function isValidPath(path) {
      return path.startsWith('/') && path.length > 1;
    }

    async function listAll(root) {
      const paths = [];
      let entries;

      try {
        entries = await fs.promises.readdir(root);
      } catch {
        return paths;
      }

      for (const name of entries) {
        const childPath = joinPath(root, name);

        try {
          const nested = await fs.promises.readdir(childPath);
          if (Array.isArray(nested)) {
            paths.push(...await listAll(childPath));
            continue;
          }
        } catch {
          paths.push(childPath);
        }
      }

      return paths;
    }

    async function ensureDir(path) {
      if (!path || path === '/') {
        return;
      }

      const parts = path.split('/').filter(Boolean);
      let current = '';

      for (const part of parts) {
        current += '/' + part;
        try {
          await fs.promises.mkdir(current);
        } catch {
        }
      }
    }

    function joinPath(base, name) {
      return (base === '/' ? '' : base) + '/' + name;
    }

    function parentDir(path) {
      const lastSlash = path.lastIndexOf('/');
      return lastSlash <= 0 ? '/' : path.slice(0, lastSlash);
    }

    saveButton.addEventListener('click', saveFile);
    newFileButton.addEventListener('click', startNewFile);

    startNewFile();
    await refreshFileList();
  </script>
</body>
</html>

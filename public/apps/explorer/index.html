<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f6cbd">
  <link rel="manifest" href="/public/apps/explorer/manifest.webmanifest">
  <link rel="icon" href="/public/apps/explorer/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/public/libs/fontawesome/css/fontawesome.min.css">
  <link rel="stylesheet" href="/public/libs/fontawesome/css/solid.min.css">
  <link rel="stylesheet" href="/public/apps/explorer/explorer.css">
  <title>Explorer</title>
</head>
<body>
  <script type="module" src="/public/apps/sync/syncbar.js"></script>

  <div class="explorer-app">
    <header class="app-toolbar" aria-label="Explorer toolbar">
      <form id="address-form" class="address-form" autocomplete="off">
        <label class="sr-only" for="address-input">Folder path</label>
        <div class="address-row">
          <button id="sidebar-toggle" class="toolbar-button toolbar-button--ghost toolbar-button--icon sidebar-toggle-inline" type="button" aria-expanded="false" aria-controls="sidebar" aria-label="Toggle places" title="Places">
            <i class="fa-solid fa-bars-staggered" aria-hidden="true"></i>
            <span class="sr-only">Toggle places</span>
          </button>
          <div class="address-shell">
            <span class="address-prefix" aria-hidden="true">
              <i class="fa-solid fa-folder-tree"></i>
            </span>
            <input id="address-input" class="address-input" type="text" spellcheck="false" placeholder="/">
          </div>
        </div>
      </form>
    </header>

    <div class="explorer-shell">
      <aside id="sidebar" class="sidebar" aria-label="Places">
        <div class="sidebar-header">
          <span>Places</span>
          <button id="collapse-sidebar-button" class="toolbar-button toolbar-button--ghost toolbar-button--icon sidebar-close" type="button" aria-label="Close places" title="Close places">
            <i class="fa-solid fa-xmark" aria-hidden="true"></i>
            <span class="sr-only">Close places</span>
          </button>
        </div>
        <div class="sidebar-panel">
          <div id="sidebar-places" class="sidebar-list" aria-label="Common locations"></div>
          <div class="sidebar-divider" role="separator" aria-hidden="true"></div>
          <section class="favorites-panel" aria-labelledby="favorites-heading">
            <div class="favorites-header">
              <span id="favorites-heading">Favorites</span>
            </div>
            <div id="favorites-dropzone" class="favorites-dropzone">
              <div id="sidebar-favorites" class="sidebar-list sidebar-list--favorites" aria-live="polite"></div>
            </div>
          </section>
        </div>
      </aside>

      <div id="sidebar-backdrop" class="sidebar-backdrop" hidden></div>

      <section class="content-shell" aria-label="File browser">
        <div class="content-header">
          <div class="toolbar-group content-actions">
            <div class="toolbar-group content-actions-primary">
              <button id="up-button" class="toolbar-button toolbar-button--ghost toolbar-button--icon" type="button" aria-label="Go up" title="Up">
                <i class="fa-solid fa-arrow-up" aria-hidden="true"></i>
                <span class="sr-only">Up</span>
              </button>
              <button id="new-file-button" class="toolbar-button toolbar-button--ghost toolbar-button--icon" type="button" aria-label="Create new file" title="New file">
                <i class="fa-solid fa-file-circle-plus" aria-hidden="true"></i>
                <span class="sr-only">New file</span>
              </button>
              <button id="new-folder-button" class="toolbar-button toolbar-button--ghost toolbar-button--icon" type="button" aria-label="Create new folder" title="New folder">
                <i class="fa-solid fa-folder-plus" aria-hidden="true"></i>
                <span class="sr-only">New folder</span>
              </button>
            </div>

            <div id="content-actions-divider" class="toolbar-divider content-actions-divider" aria-hidden="true" hidden></div>

            <button id="clear-selection-button" class="toolbar-button toolbar-button--ghost toolbar-button--icon" type="button" aria-label="Clear selection" title="Clear selection" hidden>
              <i class="fa-solid fa-border-none" aria-hidden="true"></i>
              <span class="sr-only">Clear selection</span>
            </button>

            <div id="content-actions-secondary" class="toolbar-group content-actions-secondary" hidden>
              <button id="cut-selection-button" class="toolbar-button toolbar-button--ghost toolbar-button--icon" type="button" aria-label="Cut selected items" title="Cut selected items" hidden>
                <i class="fa-solid fa-scissors" aria-hidden="true"></i>
                <span class="sr-only">Cut selected items</span>
              </button>
              <button id="copy-selection-button" class="toolbar-button toolbar-button--ghost toolbar-button--icon" type="button" aria-label="Copy selected items" title="Copy selected items" hidden>
                <i class="fa-solid fa-copy" aria-hidden="true"></i>
                <span class="sr-only">Copy selected items</span>
              </button>
              <button id="paste-clipboard-button" class="toolbar-button toolbar-button--ghost toolbar-button--icon" type="button" aria-label="Paste into current folder" title="Paste into current folder" hidden>
                <i class="fa-solid fa-paste" aria-hidden="true"></i>
                <span class="sr-only">Paste into current folder</span>
              </button>
              <button id="rename-selection-button" class="toolbar-button toolbar-button--ghost toolbar-button--icon" type="button" aria-label="Rename selected item" title="Rename selected item" hidden>
                <i class="fa-solid fa-i-cursor" aria-hidden="true"></i>
                <span class="sr-only">Rename selected item</span>
              </button>
              <button id="pin-selection-button" class="toolbar-button toolbar-button--ghost toolbar-button--icon" type="button" aria-label="Pin selected folder" title="Pin selected folder" hidden>
                <i class="fa-solid fa-thumbtack" aria-hidden="true"></i>
                <span class="sr-only">Pin selected folder</span>
              </button>
              <button id="unpin-selection-button" class="toolbar-button toolbar-button--ghost toolbar-button--icon" type="button" aria-label="Unpin selected folder" title="Unpin selected folder" hidden>
                <i class="fa-solid fa-xmark" aria-hidden="true"></i>
                <span class="sr-only">Unpin selected folder</span>
              </button>
              <button id="delete-selection-button" class="toolbar-button toolbar-button--danger toolbar-button--icon" type="button" aria-label="Delete selected" title="Delete selected" hidden>
                <i class="fa-solid fa-trash" aria-hidden="true"></i>
                <span class="sr-only">Delete selected</span>
              </button>
            </div>

            <button id="operations-menu-button" class="toolbar-button toolbar-button--ghost toolbar-button--icon operations-menu-button" type="button" aria-label="More actions" title="More actions" hidden>
              <i class="fa-solid fa-ellipsis" aria-hidden="true"></i>
              <span class="sr-only">More actions</span>
            </button>
          </div>

          <div class="view-switcher" role="tablist" aria-label="View mode">
            <button class="view-button view-button--icon" type="button" data-view="grid" role="tab" aria-selected="true" aria-label="Large icons view" title="Large icons">
              <i class="fa-solid fa-table-cells-large" aria-hidden="true"></i>
              <span class="sr-only">Large icons</span>
            </button>
            <button class="view-button view-button--icon" type="button" data-view="list" role="tab" aria-selected="false" aria-label="List view" title="List">
              <i class="fa-solid fa-list" aria-hidden="true"></i>
              <span class="sr-only">List</span>
            </button>
            <button class="view-button view-button--icon" type="button" data-view="tree" role="tab" aria-selected="false" aria-label="Tree view" title="Tree">
              <i class="fa-solid fa-folder-tree" aria-hidden="true"></i>
              <span class="sr-only">Tree</span>
            </button>
          </div>
        </div>

        <div id="content-view" class="content-view" aria-live="polite"></div>
      </section>
    </div>

    <footer class="status-bar">
      <span id="selection-summary">No selection</span>
      <span id="status-message">Explorer</span>
    </footer>
  </div>

  <dialog id="editor-dialog" class="modal">
    <form method="dialog" class="modal-card modal-card--editor">
      <header class="modal-header">
        <div>
          <p class="modal-label">Text editor</p>
          <h2 id="editor-title">Open file</h2>
        </div>
        <button id="editor-close-button" class="toolbar-button toolbar-button--ghost toolbar-button--icon modal-close-button" type="button" aria-label="Close editor" title="Close editor">
          <i class="fa-solid fa-xmark" aria-hidden="true"></i>
          <span class="sr-only">Close editor</span>
        </button>
      </header>

      <textarea id="editor-textarea" class="editor-textarea" spellcheck="false" placeholder="File contents"></textarea>

      <footer class="modal-actions">
        <span id="editor-status" class="modal-status"></span>
        <button id="editor-save-button" class="toolbar-button" type="button">Save</button>
      </footer>
    </form>
  </dialog>

  <dialog id="create-dialog" class="modal">
    <form id="create-form" class="modal-card modal-card--compact" method="dialog">
      <header class="modal-header">
        <div>
          <p id="create-label" class="modal-label">Create item</p>
          <h2 id="create-title">New item</h2>
        </div>
        <button id="create-cancel-button" class="toolbar-button toolbar-button--ghost" type="button">Cancel</button>
      </header>

      <label class="field-group" for="create-name-input">
        Name
        <input id="create-name-input" class="field-input" type="text" autocomplete="off" spellcheck="false" placeholder="name.txt">
      </label>

      <p id="create-target" class="helper-text"></p>
      <p id="create-error" class="error-text" role="alert"></p>

      <footer class="modal-actions">
        <span></span>
        <button id="create-submit-button" class="toolbar-button" type="submit">Create</button>
      </footer>
    </form>
  </dialog>

  <dialog id="alert-dialog" class="modal">
    <form method="dialog" class="modal-card modal-card--compact">
      <header class="modal-header">
        <div>
          <p class="modal-label">Explorer</p>
          <h2 id="alert-title">Invalid address</h2>
        </div>
        <button id="alert-close-button" class="toolbar-button toolbar-button--ghost toolbar-button--icon modal-close-button" type="submit" aria-label="Close message" title="Close message">
          <i class="fa-solid fa-xmark" aria-hidden="true"></i>
          <span class="sr-only">Close message</span>
        </button>
      </header>

      <p id="alert-message" class="helper-text"></p>

      <footer class="modal-actions">
        <span></span>
        <button id="alert-confirm-button" class="toolbar-button" type="submit">OK</button>
      </footer>
    </form>
  </dialog>

  <div id="action-menu" class="action-menu" hidden></div>
  <div id="drop-tooltip" class="drop-tooltip" hidden></div>

  <script type="module" src="/public/apps/explorer/explorer.js"></script>
</body>
</html>
